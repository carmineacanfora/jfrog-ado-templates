# stages/jfrog-upload-generic.yml
# Upload generic artifacts to Artifactory via JFrog CLI.
# Admin-controlled — devs cannot modify.

parameters:
  - name: sourcePattern
    type: string
  - name: targetRepo
    type: string
  - name: buildName
    type: string
  - name: buildNumber
    type: string
  - name: project
    type: string
    default: ''
  - name: moduleName
    type: string
    default: ''
  - name: flat
    type: boolean
    default: true

steps:
  - script: |
      FLAT_FLAG=""
      if [ "${{ parameters.flat }}" = "True" ]; then
        FLAT_FLAG="--flat"
      fi

      MODULE_FLAG=""
      if [ -n "${{ parameters.moduleName }}" ]; then
        MODULE_FLAG="--module=${{ parameters.moduleName }}"
      fi

      PROJECT_FLAG=""
      if [ -n "${{ parameters.project }}" ]; then
        PROJECT_FLAG="--project=${{ parameters.project }}"
      fi

      jf rt u "${{ parameters.sourcePattern }}" "${{ parameters.targetRepo }}/" \
        $FLAT_FLAG \
        $MODULE_FLAG \
        --build-name="${{ parameters.buildName }}" \
        --build-number="${{ parameters.buildNumber }}" \
        $PROJECT_FLAG
    displayName: 'Upload to ${{ parameters.targetRepo }}'
