# stages/jfrog-npm-install.yml
# NPM install via JFrog CLI with optional curation audit on failure.
# Admin-controlled — devs cannot modify.

parameters:
  - name: resolveRepo
    type: string
  - name: buildName
    type: string
  - name: buildNumber
    type: string
  - name: project
    type: string
    default: ''
  - name: npmArguments
    type: string
    default: ''
  - name: threads
    type: number
    default: 5
  - name: enableCurationAudit
    type: boolean
    default: false
  - name: installNode
    type: boolean
    default: true
  - name: nodeVersion
    type: string
    default: '18.x'

steps:
  - ${{ if eq(parameters.installNode, true) }}:
    - task: UseNode@1
      inputs:
        version: '${{ parameters.nodeVersion }}'
      displayName: 'Install Node ${{ parameters.nodeVersion }}'

  - script: |
      PROJECT_FLAG=""
      if [ -n "${{ parameters.project }}" ]; then
        PROJECT_FLAG="--project=${{ parameters.project }}"
      fi

      jf npmc --repo-resolve ${{ parameters.resolveRepo }}

      jf npm i ${{ parameters.npmArguments }} \
        --build-name="${{ parameters.buildName }}" \
        --build-number="${{ parameters.buildNumber }}" \
        --threads=${{ parameters.threads }} \
        $PROJECT_FLAG \
      || {
        CURATION_ENABLED="${{ parameters.enableCurationAudit }}"
        if [ "$CURATION_ENABLED" = "True" ]; then
          echo "##[warning]NPM Install failed. Running Curation Audit..."
          jf curation-audit --threads=${{ parameters.threads }}
        else
          echo "##[warning]NPM Install failed. Curation Audit is disabled."
        fi
        echo "##[error]NPM Install failed. See above for details."
        exit 1
      }
    displayName: 'NPM Install'
