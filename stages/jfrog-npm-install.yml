# stages/jfrog-npm-install.yml
# NPM install via JFrog CLI with optional curation audit on failure.
# Admin-controlled — devs cannot modify.

parameters:
  - name: jfrogConnection
    type: string
  - name: resolveRepo
    type: string
  - name: buildName
    type: string
  - name: buildNumber
    type: string
  - name: project
    type: string
    default: ''
  - name: npmArguments
    type: string
    default: ''
  - name: threads
    type: number
    default: 5
  - name: enableCurationAudit
    type: boolean
    default: false

steps:
  - task: JFrogCliV2@1
    continueOnError: true
    name: npmInstall
    inputs:
      jfrogPlatformConnection: '${{ parameters.jfrogConnection }}'
      command: |
        jf npmc --repo-resolve ${{ parameters.resolveRepo }}
        jf npm i ${{ parameters.npmArguments }} --build-name="${{ parameters.buildName }}" --build-number="${{ parameters.buildNumber }}" --threads=${{ parameters.threads }} --project=${{ parameters.project }}
    displayName: 'NPM Install'

  - ${{ if eq(parameters.enableCurationAudit, true) }}:
    - task: JFrogCliV2@1
      condition: not(eq(variables['Agent.JobStatus'], 'Succeeded'))
      inputs:
        jfrogPlatformConnection: '${{ parameters.jfrogConnection }}'
        command: |
          jf npmc --repo-resolve ${{ parameters.resolveRepo }}
          jf curation-audit --threads=${{ parameters.threads }}
      displayName: 'Curation Audit (on NPM failure)'