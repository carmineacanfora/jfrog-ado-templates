# stages/jfrog-xray-scan.yml
# Runs JFrog Xray Audit on the local project.
# Admin-controlled — devs cannot modify.

parameters:
  - name: jfrogConnection
    type: string
  - name: packageManager
    type: string
    default: 'npm'
    values:
      - npm
      - maven
      - gradle
      - pip
      - go
      - nuget
  - name: failBuild
    type: boolean
    default: true

steps:
  - task: JFrogCliV2@1
    inputs:
      jfrogPlatformConnection: '${{ parameters.jfrogConnection }}'
      command: 'jf audit --${{ parameters.packageManager }} --fail=${{ parameters.failBuild }}'
    displayName: 'Scan Code'
