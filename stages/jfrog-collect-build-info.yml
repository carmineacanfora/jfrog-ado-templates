# stages/jfrog-collect-build-info.yml
# Collects environment variables and git info for build-info.
# Admin-controlled — devs cannot modify.

parameters:
  - name: buildName
    type: string
  - name: buildNumber
    type: string
  - name: project
    type: string
    default: ''

steps:
  - script: |
      PROJECT_FLAG=""
      if [ -n "${{ parameters.project }}" ]; then
        PROJECT_FLAG="--project ${{ parameters.project }}"
      fi

      jf rt build-collect-env "${{ parameters.buildName }}" "${{ parameters.buildNumber }}" $PROJECT_FLAG
    displayName: 'Collect Build Environment'

  - script: |
      PROJECT_FLAG=""
      if [ -n "${{ parameters.project }}" ]; then
        PROJECT_FLAG="--project ${{ parameters.project }}"
      fi

      jf rt build-add-git "${{ parameters.buildName }}" "${{ parameters.buildNumber }}" $PROJECT_FLAG
    displayName: 'Collect Git Info'
