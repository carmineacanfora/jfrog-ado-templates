# stages/jfrog-upload-helm.yml
# Upload Helm charts to Artifactory via JFrog CLI.
# Admin-controlled — devs cannot modify.

parameters:
  - name: sourcePattern
    type: string
    default: 'helm/*.tgz'
  - name: targetRepo
    type: string
  - name: buildName
    type: string
  - name: buildNumber
    type: string
  - name: project
    type: string
    default: ''
  - name: moduleName
    type: string
    default: ''

steps:
  - script: |
      MODULE_FLAG=""
      if [ -n "${{ parameters.moduleName }}" ]; then
        MODULE_FLAG="--module=${{ parameters.moduleName }}"
      fi

      PROJECT_FLAG=""
      if [ -n "${{ parameters.project }}" ]; then
        PROJECT_FLAG="--project=${{ parameters.project }}"
      fi

      jf rt u "${{ parameters.sourcePattern }}" "${{ parameters.targetRepo }}/" \
        --flat \
        $MODULE_FLAG \
        --build-name="${{ parameters.buildName }}" \
        --build-number="${{ parameters.buildNumber }}" \
        $PROJECT_FLAG
    displayName: 'Upload Helm Charts to ${{ parameters.targetRepo }}'
