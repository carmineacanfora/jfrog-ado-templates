# stages/jfrog-build-scan.yml
# Scans a published build with JFrog Xray.
# Admin-controlled — devs cannot modify.

parameters:
  - name: buildName
    type: string
  - name: buildNumber
    type: string
  - name: project
    type: string
    default: ''
  - name: failBuild
    type: boolean
    default: true
  - name: vuln
    type: boolean
    default: true

steps:
  - script: |
      PROJECT_FLAG=""
      if [ -n "${{ parameters.project }}" ]; then
        PROJECT_FLAG="--project=${{ parameters.project }}"
      fi

      VULN_FLAG=""
      if [ "${{ parameters.vuln }}" = "True" ]; then
        VULN_FLAG="--vuln"
      fi

      jf build-scan "${{ parameters.buildName }}" "${{ parameters.buildNumber }}" \
        $PROJECT_FLAG \
        --fail=${{ parameters.failBuild }} \
        $VULN_FLAG
    displayName: 'Xray Build Scan'
