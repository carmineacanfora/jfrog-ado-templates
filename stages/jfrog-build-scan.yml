# stages/jfrog-build-scan.yml
# Scans a published build with JFrog Xray.
# Admin-controlled — devs cannot modify.

parameters:
  - name: jfrogConnection
    type: string
  - name: buildName
    type: string
  - name: buildNumber
    type: string
  - name: project
    type: string
    default: ''
  - name: failBuild
    type: boolean
    default: true
  - name: vuln
    type: boolean
    default: true

steps:
  - task: JFrogCliV2@1
    inputs:
      jfrogPlatformConnection: '${{ parameters.jfrogConnection }}'
      command: 'jf build-scan "${{ parameters.buildName }}" "${{ parameters.buildNumber }}" --fail=${{ parameters.failBuild }} --project ${{ parameters.project }} --vuln=${{ parameters.vuln }}'
    displayName: 'Scan Build'
