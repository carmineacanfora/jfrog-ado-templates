# stages/jfrog-build-collect-info.yml
# Collects environment variables and git info for build-info.
# Admin-controlled — devs cannot modify.

parameters:
  - name: jfrogConnection
    type: string
  - name: buildName
    type: string
  - name: buildNumber
    type: string
  - name: project
    type: string
    default: ''

steps:
  - task: JFrogCliV2@1
    inputs:
      jfrogPlatformConnection: '${{ parameters.jfrogConnection }}'
      command: 'jf rt build-collect-env "${{ parameters.buildName }}" "${{ parameters.buildNumber }}" --project ${{ parameters.project }}'
    displayName: 'Collect Build Environment'

  - task: JFrogCliV2@1
    inputs:
      jfrogPlatformConnection: '${{ parameters.jfrogConnection }}'
      command: 'jf rt build-add-git "${{ parameters.buildName }}" "${{ parameters.buildNumber }}" --project ${{ parameters.project }}'
    displayName: 'Collect Git Info'
