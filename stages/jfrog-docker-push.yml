# stages/jfrog-docker-push.yml
# Push Docker image and add to build-info via JFrog CLI.
# Expects the image to be already built and available locally.
# Admin-controlled — devs cannot modify.

parameters:
  - name: jfrogConnection
    type: string
  - name: jfrogUrl
    type: string
  - name: dockerRepo
    type: string
  - name: imageName
    type: string
  - name: imageTag
    type: string
  - name: buildName
    type: string
  - name: buildNumber
    type: string
  - name: project
    type: string
    default: ''

steps:
  - task: JFrogCliV2@1
    inputs:
      jfrogPlatformConnection: '${{ parameters.jfrogConnection }}'
      command: |
        jf docker login ${{ parameters.jfrogUrl }}
        jf docker push ${{ parameters.jfrogUrl }}/${{ parameters.dockerRepo }}/${{ parameters.imageName }}:${{ parameters.imageTag }} --build-name="${{ parameters.buildName }}" --build-number="${{ parameters.buildNumber }}"
    displayName: 'Push Docker Image'
