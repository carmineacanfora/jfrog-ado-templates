# stages/jfrog-docker-push.yml
# Push Docker image and add to build-info via JFrog CLI.
# Expects the image to be already built and available locally.
# Admin-controlled — devs cannot modify.

parameters:
  - name: jfrogArtifactoryConnection
    type: string
  - name: jfrogUrl
    type: string
  - name: dockerRepo
    type: string
  - name: imageName
    type: string
  - name: imageTag
    type: string
  - name: buildName
    type: string
  - name: buildNumber
    type: string
  - name: project
    type: string
    default: ''

steps:
  - task: JFrogDocker@1
    inputs:
      command: 'Push'
      artifactoryConnection: '${{ parameters.jfrogArtifactoryConnection }}'
      imageName: '${{ parameters.jfrogUrl }}/${{ parameters.dockerRepo }}/${{ parameters.imageName }}:${{ parameters.imageTag }}'
      collectBuildInfo: true
      buildName: '${{ parameters.buildName }}'
      buildNumber: '${{ parameters.buildNumber }}'
      projectKey: '${{ parameters.project }}'
    displayName: 'Push Docker Image'
