# stages/jfrog-build-publish.yml
# Collects env vars, git info, and publishes build-info to Artifactory.
# The --env-exclude is admin-enforced and cannot be overridden by devs.
# Admin-controlled — devs cannot modify.

parameters:
  - name: jfrogConnection
    type: string
  - name: buildName
    type: string
  - name: buildNumber
    type: string
  - name: project
    type: string
    default: ''
  - name: envExclude
    type: string
    default: '*password*;*secret*;*key*;*token*;*credentials*;*ACCESS*;*PRIVATE*'

steps:
  - task: JFrogCliV2@1
    inputs:
      jfrogPlatformConnection: '${{ parameters.jfrogConnection }}'
      command: |
        jf rt build-add-git "${{ parameters.buildName }}" "${{ parameters.buildNumber }}" --project=${{ parameters.project }}
        jf rt build-publish "${{ parameters.buildName }}" "${{ parameters.buildNumber }}" --project=${{ parameters.project }} --env-exclude="${{ parameters.envExclude }}" --build-url="$(System.CollectionUri)$(System.TeamProject)/_build/results?buildId=$(Build.BuildId)"
      # jf rt build-collect-env "${{ parameters.buildName }}" "${{ parameters.buildNumber }}" --project=${{ parameters.project }}
    displayName: 'Publish Build Info'
