# stages/jfrog-build-publish.yml
# Publishes build-info to Artifactory.
# Admin-controlled — devs cannot modify.
# The --env-exclude is enforced here and cannot be overridden.

parameters:
  - name: jfrogConnection
    type: string
  - name: buildName
    type: string
  - name: buildNumber
    type: string
  - name: project
    type: string
    default: ''
  - name: envExclude
    type: string
    default: '*password*;*secret*;*key*;*token*;*credentials*;*ACCESS*;*PRIVATE*'

steps:
  - task: JFrogPublishBuildInfo@1
    inputs:
      jfrogPlatformConnection: '${{ parameters.jfrogConnection }}'
      buildName: '${{ parameters.buildName }}'
      buildNumber: '${{ parameters.buildNumber }}'
      projectKey: '${{ parameters.project }}'
      excludeEnvVars: '${{ parameters.envExclude }}'
    displayName: 'Publish Build Info'
