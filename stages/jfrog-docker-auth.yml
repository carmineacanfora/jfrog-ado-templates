# stages/jfrog-docker-auth.yml
# Docker login to JFrog Artifactory via JFrog CLI.
# Admin-controlled — devs cannot modify.

parameters:
  - name: jfrogConnection
    type: string
  - name: jfrogUrl
    type: string

steps:
  - task: JFrogCliV2@1
    inputs:
      jfrogPlatformConnection: '${{ parameters.jfrogConnection }}'
      command: 'jf docker login ${{ parameters.jfrogUrl }}'
    displayName: 'Docker Authenticate'
