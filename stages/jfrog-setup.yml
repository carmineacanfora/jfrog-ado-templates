# stages/jfrog-setup.yml
# Installs and configures JFrog CLI via OIDC.
# Admin-controlled — devs cannot modify.

parameters:
  - name: jfrogUrl
    type: string
  - name: oidcProviderName
    type: string
  - name: oidcAudience
    type: string
    default: ''

steps:
  - script: |
      curl -fL https://install-cli.jfrog.io | sh
      jf c add jfrog-server \
        --url="https://${{ parameters.jfrogUrl }}/" \
        --oidc-provider-name="${{ parameters.oidcProviderName }}" \
        ${{ if ne(parameters.oidcAudience, '') }}--oidc-audience="${{ parameters.oidcAudience }}"${{ endif }} \
        --interactive=false
      jf c use jfrog-server
      echo "JFrog CLI version: $(jf --version)"
    displayName: 'Install & Configure JFrog CLI (OIDC)'
