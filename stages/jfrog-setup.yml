# stages/jfrog-setup.yml
# Configures JFrog CLI via OIDC using the ADO extension.
# Admin-controlled — devs cannot modify.

parameters:
  - name: jfrogConnection
    type: string
  - name: jfrogUrl
    type: string

steps:
  - task: JFrogCliV2@1
    name: jfrogSetup
    inputs:
      jfrogPlatformConnection: '${{ parameters.jfrogConnection }}'
      command: 'jf rt ping'
    displayName: 'Configure JFrog CLI (OIDC)'

  - script: |
      JF_PATH=$(find /opt/hostedtoolcache/jf -name "jf" -type f 2>/dev/null | head -1)
      if [ -z "$JF_PATH" ]; then
        echo "##[error]JFrog CLI not found"
        exit 1
      fi
      JF_DIR=$(dirname "$JF_PATH")
      echo "##vso[task.prependpath]$JF_DIR"

      # Configure persistent server using OIDC token
      "$JF_PATH" c add jfrog-server \
        --url="https://${{ parameters.jfrogUrl }}/" \
        --access-token="$OIDC_TOKEN" \
        --interactive=false
      "$JF_PATH" c use jfrog-server
      echo "JFrog CLI version: $("$JF_PATH" --version)"
      "$JF_PATH" rt ping
    displayName: 'Add JFrog CLI to PATH & Configure'
    env:
      OIDC_TOKEN: $(jfrogSetup.oidc_token)
