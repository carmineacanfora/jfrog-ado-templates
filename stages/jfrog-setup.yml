# stages/jfrog-setup.yml
# Verifies JFrog connection via OIDC.
# Admin-controlled — devs cannot modify.

parameters:
  - name: jfrogConnection
    type: string

steps:
  - task: JFrogCliV2@1
    inputs:
      jfrogPlatformConnection: '${{ parameters.jfrogConnection }}'
      command: 'jf rt ping'
    displayName: 'Setup JFrog OIDC'
