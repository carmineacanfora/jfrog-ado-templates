# stages/jfrog-generic-push.yml
# Upload generic artifacts to Artifactory via JFrog CLI.
# Admin-controlled — devs cannot modify.

parameters:
  - name: jfrogConnection
    type: string
  - name: sourcePattern
    type: string
  - name: targetRepo
    type: string
  - name: buildName
    type: string
  - name: buildNumber
    type: string
  - name: project
    type: string
    default: ''
  - name: moduleName
    type: string
    default: ''
  - name: flat
    type: boolean
    default: true

steps:
  - task: JFrogCliV2@1
    inputs:
      jfrogPlatformConnection: '${{ parameters.jfrogConnection }}'
      command: 'jf rt u "${{ parameters.sourcePattern }}" "${{ parameters.targetRepo }}/" --flat=${{ parameters.flat }} --module="${{ parameters.moduleName }}" --build-name="${{ parameters.buildName }}" --build-number="${{ parameters.buildNumber }}" --project ${{ parameters.project }}'
    displayName: 'Push Generic Artifact'
