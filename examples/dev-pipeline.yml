# Example: How a dev uses the admin templates with OIDC
# Pipeline built from the JFrog Pipeline Templates for Azure DevOps:
# https://github.com/carmineacanfora/jfrog-ado-templates

trigger: none

# Read-only repo containing the JFrog ADO Templates managed by the Platform Team
resources:
  repositories:
    - repository: jfrog-templates
      type: github
      name: 'carmineacanfora/jfrog-ado-templates'
      endpoint: 'carmineacanfora'
      ref: refs/heads/main

pool:
  vmImage: 'ubuntu-latest'

extends:
  template: secured-pipeline.yml@jfrog-templates
  parameters:
    # --- JFrog Connection ---
    jfrogConnection: 'JFrog Platform - solengeu OIDC'
    jfrogUrl: 'solengeu.jfrog.io'
    project: 'carm'

    # --- Build Info ---
    buildName: 'ado-ejs-demo'

    # --- Dev preBuildSteps ---
    # These run BEFORE JFrog CLI is available — no JFrog access.
    preBuildSteps:
      - checkout: self
      - script: |
          docker buildx create --use --name mybuilder
          docker buildx inspect --bootstrap
        displayName: 'Setup Docker Buildx'
      - task: UseNode@1
        inputs:
          version: '18.x'
        displayName: 'Setup Node'

    # --- NPM Install (with curation audit on failure) ---
    enableNpm: true
    npmResolveRepo: 'carm-npmjs-remote'
    npmArguments: '--loglevel=notice'
    enableCurationAudit: true

    # --- Xray Audit ---
    enableXrayAudit: false

    # --- Docker ---
    enableDockerPush: true
    dockerRepo: 'carm-docker-dev-local'
    imageName: 'ejs'

    # Dev controls how the image is built.
    # Must tag as: jfrogUrl/dockerRepo/imageName:imageTag
    # Must NOT push — admin template handles push.
    dockerBuildSteps:
    - script: |
        docker build \
          --tag "solengeu.jfrog.io/carm-docker-dev-local/ejs:$(Build.BuildId)" \
          .
      displayName: 'Build Docker Image'

    # --- Uploads ---
    enableUploadGeneric: true
    genericSourcePattern: 'rn/Release-Note-App-1.0.pdf'
    genericTargetRepo: 'carm-generic-dev-local'
    genericModuleName: 'release_note:$(Build.BuildId)'

    enableUploadHelm: true
    helmTargetRepo: 'carm-helm-dev-local'
    helmModuleName: 'helm_charts:$(Build.BuildId)'

    # --- Build Info ---
    enablePublishBuild: true

    # --- Build Scan ---
    enableBuildScan: true
